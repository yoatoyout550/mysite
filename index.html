<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAKAMOZ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
min-height:100vh;
}
.bg{
position:fixed;inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(80,120,255,.25),transparent 35%),
radial-gradient(circle at 80% 30%,rgba(180,80,255,.18),transparent 35%),
radial-gradient(circle at 50% 80%,rgba(0,180,255,.15),transparent 40%);
filter:blur(40px);
animation:move 12s ease-in-out infinite alternate;
z-index:-1;
}
@keyframes move{
from{transform:translateY(-20px)}
to{transform:translateY(20px)}
}
.container{
max-width:1100px;
margin:auto;
padding:80px 24px;
}
.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}
h1{
font-size:clamp(3rem,9vw,7rem);
letter-spacing:.08em;
}
p{
margin-top:20px;
font-size:1.2rem;
max-width:700px;
line-height:1.7;
color:#cfcfcf;
}
.btn{
display:inline-block;
margin-top:35px;
padding:14px 26px;
border:1px solid rgba(255,255,255,.2);
border-radius:999px;
color:white;
text-decoration:none;
backdrop-filter:blur(10px);
transition:.3s;
}
.btn:hover{
transform:translateY(-2px);
border-color:rgba(255,255,255,.5);
}
.section{
padding:80px 0;
border-top:1px solid rgba(255,255,255,.08);
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:30px;
}
.card{
padding:24px;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
transition:.3s;
}
.card:hover{
transform:translateY(-4px);
}
.small{color:#aaa;font-size:.95rem}
</style>
</head>
<body>
<div class="bg"></div>

<div class="container hero">
<div class="small">AI • Automation • Web</div>
<h1>YAKAMOZ</h1>
<p>
I build modern web experiences, automation systems and AI-powered tools
focused on speed, simplicity and measurable results.
</p>
<a class="btn" href="#services">Explore</a>
</div>

<div class="container section" id="services">
<h2>Services</h2>
<div class="grid">
<div class="card">AI Automation</div>
<div class="card">Landing Pages</div>
<div class="card">Custom Web Apps</div>
<div class="card">API Integrations</div>
</div>
</div>

<div class="container section">
<h2>Contact</h2>
<p>Email • Telegram • GitHub</p>
</div>

</body>
</html>
